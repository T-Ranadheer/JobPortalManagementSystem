<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">

  <title>Manage Jobs</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet"
        th:href="@{/css/manage-jobs.css}">

</head>

<body>

<div class="container py-5">

  <h2 class="mb-4">

    Manage Posted Jobs

  </h2>

  <table class="table table-hover shadow">

    <thead class="table-dark">

    <tr>

      <th>ID</th>

      <th>Job Title</th>

      <th>Company</th>

      <th>Location</th>

      <th>Salary</th>

      <th>Experience</th>

      <th>Actions</th>

    </tr>

    </thead>

    <tbody>

    <tr th:each="job : ${jobs}">

      <td th:text="${job.id}"></td>

      <td th:text="${job.title}"></td>

      <td th:text="${job.company}"></td>

      <td th:text="${job.location}"></td>

      <td th:text="${job.salary}"></td>

      <td th:text="${job.experience}"></td>

      <td>

        <a class="btn btn-warning btn-sm"

           th:href="@{'/recruiter/edit-job/'+${job.id}}">

          Edit

        </a>

        <a class="btn btn-danger btn-sm"

           onclick="return confirm('Delete this job?')"

           th:href="@{'/recruiter/delete-job/'+${job.id}}">

          Delete

        </a>

      </td>

    </tr>

    </tbody>

  </table>

  <a class="btn btn-primary"

     th:href="@{/recruiter/post-job}">

    + Add New Job

  </a>

  <a class="btn btn-secondary"

   th:href="@{/recruiter/manage-jobs}">
    💼 Manage Jobs


    Back

  </a>

</div>

</body>

</html>
