<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Edit Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">

            <h2>Edit Job</h2>

        </div>

        <div class="card-body">

            <form th:action="@{/recruiter/update-job}"
                  th:object="${job}"
                  method="post">

                <!-- Hidden ID -->
                <input type="hidden" th:field="*{id}">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Job Title</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{title}"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Company</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{company}"
                               required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Location</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{location}"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Salary</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{salary}">

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Experience</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{experience}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Education</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{education}">

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Skills</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{skills}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Vacancies</label>

                        <input type="number"
                               class="form-control"
                               th:field="*{vacancies}">

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Employment Type</label>

                        <select class="form-select"
                                th:field="*{employmentType}">

                            <option value="Full Time">Full Time</option>
                            <option value="Part Time">Part Time</option>
                            <option value="Internship">Internship</option>
                            <option value="Contract">Contract</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Application Deadline</label>

                        <input type="date"
                               class="form-control"
                               th:field="*{applicationDeadline}">

                    </div>

                </div>

                <div class="mb-3">

                    <label>Category</label>

                    <select class="form-select"
                            th:field="*{category}">

                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}">
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label>Description</label>

                    <textarea class="form-control"
                              rows="6"
                              th:field="*{description}">
                    </textarea>

                </div>

                <button class="btn btn-success">

                    Update Job

                </button>

                <a th:href="@{/recruiter/manage-jobs}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
