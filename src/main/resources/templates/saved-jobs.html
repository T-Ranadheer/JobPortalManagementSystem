<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Saved Jobs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">Saved Jobs</h2>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

            <tr>

                <th>Job Title</th>

                <th>Company</th>

                <th>Location</th>

                <th>Salary</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody>

            <tr th:if="${#lists.isEmpty(savedJobs)}">

                <td colspan="5" class="text-center">

                    No Saved Jobs

                </td>

            </tr>

            <tr th:each="saved : ${savedJobs}">

                <td th:text="${saved.job.title}"></td>

                <td th:text="${saved.job.company}"></td>

                <td th:text="${saved.job.location}"></td>

                <td th:text="${saved.job.salary}"></td>

                <td>

                    <a th:href="@{'/job/' + ${saved.job.id}}"
                       class="btn btn-primary btn-sm">

                        View

                    </a>

                    <a th:href="@{'/saved-job/delete/' + ${saved.id}}"
                       class="btn btn-danger btn-sm">

                        Remove

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

        <a th:href="@{/dashboard}"
           class="btn btn-secondary">

            Back to Dashboard

        </a>

    </div>

</div>

</body>

</html>
