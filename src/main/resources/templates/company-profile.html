<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Company Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/company-profile.css}">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2>🏢 Company Profile</h2>

        </div>

        <div class="card-body">

            <!-- Success Message -->
            <div th:if="${param.success}" class="alert alert-success">
                Company Profile Saved Successfully.
            </div>

            <form th:action="@{/recruiter/company/save}"
                  th:object="${company}"
                  method="post"
                  enctype="multipart/form-data">

                <!-- Hidden ID -->
                <input type="hidden" th:field="*{id}">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Company Name</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{companyName}"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Website</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{website}"
                               placeholder="https://example.com">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Email</label>

                        <input type="email"
                               class="form-control"
                               th:field="*{email}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Phone</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{phone}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Industry</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{industry}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Company Size</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{companySize}"
                               placeholder="50-100 Employees">

                    </div>

                    <div class="col-12 mb-3">

                        <label class="form-label">Address</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{address}">

                    </div>

                    <div class="col-12 mb-3">

                        <label class="form-label">Company Logo</label>

                        <input type="file"
                               class="form-control"
                               name="logo"
                               accept="image/*">

                    </div>

                    <!-- Show Current Logo -->
                    <div class="col-12 mb-3"
                         th:if="${company.logo != null}">

                        <label class="form-label">Current Logo</label>

                        <br>

                        <img th:src="@{'/uploads/company/' + ${company.logo}}"
                             width="120"
                             class="img-thumbnail">

                    </div>

                    <div class="col-12 mb-3">

                        <label class="form-label">Description</label>

                        <textarea class="form-control"
                                  rows="5"
                                  th:field="*{description}">
                        </textarea>

                    </div>

                </div>

                <button type="submit"
                        class="btn btn-success">

                    Save Company

                </button>

                <a th:href="@{/recruiter/company/view}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
