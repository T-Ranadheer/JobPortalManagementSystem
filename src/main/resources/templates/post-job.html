<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Post New Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2>Post New Job</h2>

        </div>

        <div class="card-body">

            <form th:action="${job.id == null} ? @{/recruiter/save-job} : @{/recruiter/update-job}"
                  th:object="${job}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Job Title</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{title}"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Company</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{company}"
                               required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Location</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{location}"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Salary</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{salary}"
                               placeholder="Eg: 6 LPA">

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Experience Required</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{experience}"
                               placeholder="Eg: 2 Years">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Education</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{education}"
                               placeholder="B.Tech / MCA">

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Required Skills</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{skills}"
                               placeholder="Java, Spring Boot, MySQL">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Vacancies</label>

                        <input type="number"
                               class="form-control"
                               th:field="*{vacancies}">

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Employment Type</label>

                        <select class="form-select"
                                th:field="*{employmentType}">

                            <option value="Full Time">Full Time</option>

                            <option value="Part Time">Part Time</option>

                            <option value="Internship">Internship</option>

                            <option value="Remote">Remote</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Application Deadline</label>

                        <input type="date"
                               class="form-control"
                               th:field="*{applicationDeadline}">

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">Category</label>

                    <select class="form-select"
                            th:field="*{category}">

                        <option value="">Select Category</option>

                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}">
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">Job Description</label>

                    <textarea class="form-control"
                              rows="6"
                              th:field="*{description}">
                    </textarea>

                </div>

                <button class="btn btn-success">

                    Post Job

                </button>

                <a th:href="@{/recruiter/dashboard}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
