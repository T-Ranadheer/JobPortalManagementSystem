<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/profile.css}">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        <h2 class="text-center mb-4">
            My Profile
        </h2>

        <!-- Success Message -->

        <div th:if="${param.success}"
             class="alert alert-success">

            Profile Updated Successfully.

        </div>

        <form th:action="@{/profile/update}"
              th:object="${user}"
              method="post"
              enctype="multipart/form-data">

            <!-- Hidden ID -->

            <input type="hidden"
                   th:field="*{id}">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Full Name

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{fullName}"
                            required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Email

                    </label>

                    <input
                            type="email"
                            class="form-control"
                            th:field="*{email}"
                            readonly>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Phone

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{phone}">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Password

                    </label>

                    <input
                            type="password"
                            class="form-control"
                            value="********"
                            readonly>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Address

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{address}">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Education

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{education}">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Skills

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{skills}">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Experience

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{experience}">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        GitHub

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{github}">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        LinkedIn

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{linkedin}">

                </div>

                <!-- Profile Image -->

                <div class="col-md-12 mb-3">

                    <label class="form-label">

                        Profile Image

                    </label>

                    <input
                            type="file"
                            class="form-control"
                            name="image"
                            accept="image/*">

                </div>

                <!-- Show Existing Profile Image -->

                <div class="col-md-12 mb-3"
                     th:if="${user.profileImage != null}">

                    <img th:src="@{'/uploads/profile/' + ${user.profileImage}}"
                         width="120"
                         class="img-thumbnail">

                </div>

                <!-- Resume -->

                <div class="col-md-12 mb-3">

                    <label class="form-label">

                        Resume (PDF/DOCX)

                    </label>

                    <input
                            type="file"
                            class="form-control"
                            name="resumeFile"
                            accept=".pdf,.doc,.docx">

                </div>

                <!-- View Resume -->

                <div class="col-md-12 mb-4"
                     th:if="${user.resume != null}">

                    <a
                            th:href="@{'/uploads/resumes/' + ${user.resume}}"
                            target="_blank"
                            class="btn btn-success">

                        View Resume

                    </a>

                </div>

            </div>

            <button
                    type="submit"
                    class="btn btn-primary">

                Save Profile

            </button>

            <a
                    th:href="@{/dashboard}"
                    class="btn btn-secondary">

                Back

            </a>

        </form>

    </div>

</div>

</body>

</html>
