<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Applicants</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/recruiter-applicants.css}">

</head>

<body>

<div class="container py-5">

    <h2 class="mb-4">

        Job Applicants

    </h2>

    <table class="table table-hover shadow">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Email</th>

            <th>Phone</th>

            <th>Job</th>

            <th>Status</th>

            <th>Resume</th>

            <th>Actions</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="app : ${applications}">

            <td th:text="${app.id}"></td>

            <td th:text="${app.applicantName}"></td>

            <td th:text="${app.applicantEmail}"></td>

            <td th:text="${app.phone}"></td>

            <td th:text="${app.job.title}"></td>

            <td>

<span class="badge bg-warning"
      th:if="${app.status=='Pending'}">

Pending

</span>

                <span class="badge bg-success"
                      th:if="${app.status=='Accepted'}">

Accepted

</span>

                <span class="badge bg-danger"
                      th:if="${app.status=='Rejected'}">

Rejected

</span>

            </td>

            <td>

                <a target="_blank"
                   th:href="@{'/uploads/resumes/'+${app.resume}}"
                   class="btn btn-info btn-sm">

                    View Resume

                </a>

            </td>

            <td>

                <a class="btn btn-success btn-sm"
                   th:href="@{'/recruiter/application/accept/'+${app.id}}">

                    Accept

                </a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{'/recruiter/application/reject/'+${app.id}}">

                    Reject

                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <a class="btn btn-secondary"
       th:href="@{/recruiter/dashboard}">

        Back

    </a>

</div>

</body>

</html>
