<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Manage Jobs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/admin-jobs.css}">

</head>

<body>

<div class="container py-5">

    <h2 class="mb-4">

        Manage Jobs

    </h2>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Title</th>

                    <th>Company</th>

                    <th>Location</th>

                    <th>Salary</th>

                    <th>Experience</th>

                    <th>Category</th>

                    <th>Vacancies</th>

                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="job : ${jobs}">

                    <td th:text="${job.id}"></td>

                    <td th:text="${job.title}"></td>

                    <td th:text="${job.company}"></td>

                    <td th:text="${job.location}"></td>

                    <td th:text="${job.salary}"></td>

                    <td th:text="${job.experience}"></td>

                    <td th:text="${job.category != null ? job.category.name : 'N/A'}"></td>

                    <td th:text="${job.vacancies}"></td>

                    <td>

                        <a class="btn btn-warning btn-sm"
                           th:href="@{'/recruiter/edit-job/'+${job.id}}">

                            Edit

                        </a>

                        <a class="btn btn-danger btn-sm"

                           onclick="return confirm('Delete this job?')"

                           th:href="@{'/admin/job/delete/'+${job.id}}">

                            Delete

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <br>

    <a class="btn btn-secondary"

       th:href="@{/admin/dashboard}">

        Back

    </a>

</div>

</body>

</html>
