<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Interview List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <div class="d-flex justify-content-between">

            <h2>Scheduled Interviews</h2>

            <a th:href="@{/recruiter/dashboard}"
               class="btn btn-primary">

                Dashboard

            </a>

        </div>

        <table class="table table-bordered table-hover mt-4">

            <thead class="table-dark">

            <tr>

                <th>Applicant</th>

                <th>Job</th>

                <th>Date</th>

                <th>Time</th>

                <th>Mode</th>

                <th>Status</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="interview : ${interviews}">

                <td th:text="${interview.application.user.fullName}"></td>

                <td th:text="${interview.application.job.title}"></td>

                <td th:text="${interview.interviewDate}"></td>

                <td th:text="${interview.interviewTime}"></td>

                <td th:text="${interview.mode}"></td>

                <td>

                    <span class="badge bg-success"
                          th:text="${interview.status}">
                    </span>

                </td>

                <td>

                    <a class="btn btn-danger btn-sm"
                       th:href="@{'/recruiter/delete-interview/' + ${interview.id}}">

                        Delete

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
