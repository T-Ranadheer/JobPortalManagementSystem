<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fc;
        }

        .forgot-card{
            max-width:450px;
            margin:80px auto;
            border:none;
            border-radius:15px;
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            font-size:28px;
            font-weight:bold;
            border-radius:15px 15px 0 0 !important;
            padding:20px;
        }

        .btn-send{
            width:100%;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card shadow forgot-card">

        <div class="card-header">
            Forgot Password
        </div>

        <div class="card-body">

            <div class="alert alert-danger"
                 th:if="${error}"
                 th:text="${error}">
            </div>

            <div class="alert alert-success"
                 th:if="${success}"
                 th:text="${success}">
            </div>

            <form th:action="@{/send-otp}" method="post">

                <div class="mb-3">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your registered email"
                            required>

                </div>

                <button
                        type="submit"
                        class="btn btn-primary btn-send">

                    Send OTP

                </button>

            </form>

            <hr>

            <div class="text-center">

                <a th:href="@{/login}">
                    Back to Login
                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
