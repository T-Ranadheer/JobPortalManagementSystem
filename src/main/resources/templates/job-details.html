<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Job Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2 th:text="${job.title}"></h2>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th width="30%">Company</th>
                    <td th:text="${job.company}"></td>
                </tr>

                <tr>
                    <th>Location</th>
                    <td th:text="${job.location}"></td>
                </tr>

                <tr>
                    <th>Salary</th>
                    <td th:text="${job.salary}"></td>
                </tr>

                <tr>
                    <th>Experience Required</th>
                    <td th:text="${job.experience}"></td>
                </tr>

                <tr>
                    <th>Education</th>
                    <td th:text="${job.education}"></td>
                </tr>

                <tr>
                    <th>Required Skills</th>
                    <td th:text="${job.skills}"></td>
                </tr>

                <tr>
                    <th>No. of Vacancies</th>
                    <td th:text="${job.vacancies}"></td>
                </tr>

                <tr>
                    <th>Employment Type</th>
                    <td th:text="${job.employmentType}"></td>
                </tr>

                <tr>
                    <th>Application Deadline</th>
                    <td th:text="${job.applicationDeadline}"></td>
                </tr>

                <tr>
                    <th>Category</th>
                    <td th:text="${job.category != null ? job.category.name : 'Not Available'}"></td>
                </tr>

            </table>

            <h4 class="mt-4">Job Description</h4>

            <p th:text="${job.description}"></p>

            <hr>

            <div class="mt-4">

                <a th:href="@{'/apply/' + ${job.id}}"
                   class="btn btn-success">

                    Apply Job

                </a>

                <a th:href="@{'/save-job/' + ${job.id}}"
                   class="btn btn-warning">

                    Save Job

                </a>

                <a th:href="@{/jobs}"
                   class="btn btn-secondary">

                    Back

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
