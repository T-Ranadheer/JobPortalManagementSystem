<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Applied Jobs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <div class="d-flex justify-content-between">

            <h2>Applied Jobs</h2>

            <a th:href="@{/jobs}" class="btn btn-success">
                Browse Jobs
            </a>

        </div>

        <table class="table table-bordered table-hover mt-4">

            <thead class="table-dark">

            <tr>

                <th>Job Title</th>

                <th>Company</th>

                <th>Status</th>

                <th>Applied Date</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="application : ${applications}">

                <td th:text="${application.job.title}"></td>

                <td th:text="${application.job.companyName}"></td>

                <td th:text="${application.status}"></td>

                <td th:text="${application.appliedDate}"></td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
