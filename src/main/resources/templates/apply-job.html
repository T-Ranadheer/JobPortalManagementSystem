<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Apply Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>Apply for Job</h3>

        </div>

        <div class="card-body">

            <h4 th:text="${job.title}"></h4>

            <p>
                <strong>Company :</strong>
                <span th:text="${job.company}"></span>
            </p>

            <p>
                <strong>Location :</strong>
                <span th:text="${job.location}"></span>
            </p>

            <hr>

            <form
                    th:action="@{/apply-job}"
                    method="post"
                    enctype="multipart/form-data">

                <input
                        type="hidden"
                        name="jobId"
                        th:value="${job.id}">

                <div class="mb-3">

                    <label class="form-label">

                        Full Name

                    </label>

                    <input
                            type="text"
                            name="name"
                            class="form-control"
                            placeholder="Enter your full name"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Email

                    </label>

                    <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your email"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Phone Number

                    </label>

                    <input
                            type="text"
                            name="phone"
                            class="form-control"
                            placeholder="Enter your phone number"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Upload Resume (PDF)

                    </label>

                    <input
                            type="file"
                            name="resume"
                            class="form-control"
                            accept=".pdf"
                            required>

                </div>

                <button
                        type="submit"
                        class="btn btn-success">

                    Apply Now

                </button>

                <a
                        th:href="@{/jobs}"
                        class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
