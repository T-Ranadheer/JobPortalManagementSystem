<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Manage Companies</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/admin-companies.css}">

</head>

<body>

<div class="container py-5">

    <h2 class="mb-4">

        Company Management

    </h2>

    <div class="mb-3">

        <a class="btn btn-primary"

           th:href="@{/admin/company/add}">

            + Add Company

        </a>

        <a class="btn btn-secondary"

           th:href="@{/admin/dashboard}">

            Back

        </a>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Logo</th>

                    <th>Company</th>

                    <th>Email</th>

                    <th>Website</th>

                    <th>Location</th>

                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="company : ${companies}">

                    <td th:text="${company.id}"></td>

                    <td>

                        <img th:if="${company.logo!=null}"

                             th:src="@{'/uploads/company/'+${company.logo}}"

                             width="60"

                             height="60"

                             class="rounded">

                    </td>

                    <td th:text="${company.name}"></td>

                    <td th:text="${company.email}"></td>

                    <td>

                        <a th:href="${company.website}"

                           target="_blank">

                            Visit

                        </a>

                    </td>

                    <td th:text="${company.location}"></td>

                    <td>

                        <a class="btn btn-warning btn-sm"

                           th:href="@{'/admin/company/edit/'+${company.id}}">

                            Edit

                        </a>

                        <a class="btn btn-danger btn-sm"

                           onclick="return confirm('Delete Company?')"

                           th:href="@{'/admin/company/delete/'+${company.id}}">

                            Delete

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
