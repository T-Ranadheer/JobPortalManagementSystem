<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Company Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2>Company Details</h2>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">

                <tr>

                    <th>Logo</th>

                    <th>Company</th>

                    <th>Email</th>

                    <th>Phone</th>

                    <th>Website</th>

                    <th>Industry</th>

                    <th>Company Size</th>

                    <th>Address</th>

                    <th>Description</th>

                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(companies)}">

                    <td colspan="10" class="text-center">

                        No Company Found

                    </td>

                </tr>

                <tr th:each="company : ${companies}">

                    <td>

                        <img th:if="${company.logo != null}"
                             th:src="@{'/uploads/company/' + ${company.logo}}"
                             width="80"
                             height="80"
                             class="rounded border">

                        <span th:if="${company.logo == null}">
                            No Logo
                        </span>

                    </td>

                    <td th:text="${company.companyName}"></td>

                    <td th:text="${company.email}"></td>

                    <td th:text="${company.phone}"></td>

                    <td>

                        <a th:href="${company.website}"
                           target="_blank"
                           th:text="${company.website}">
                        </a>

                    </td>

                    <td th:text="${company.industry}"></td>

                    <td th:text="${company.companySize}"></td>

                    <td th:text="${company.address}"></td>

                    <td th:text="${company.description}"></td>

                    <td>

                        <a th:href="@{'/recruiter/company/edit/' + ${company.id}}"
                           class="btn btn-warning btn-sm">

                            Edit

                        </a>

                        <a th:href="@{'/recruiter/company/delete/' + ${company.id}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this company?');">

                            Delete

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

            <a th:href="@{/recruiter/dashboard}"
               class="btn btn-secondary">

                Back to Dashboard

            </a>

        </div>

    </div>

</div>

</body>

</html>
