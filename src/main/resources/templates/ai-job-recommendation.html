<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>AI Job Recommendation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>AI Job Recommendation</h2>

        <form th:action="@{/ai/recommendation}"
              method="post">

            <div class="mb-3">

                <label>Enter Your Skills</label>

                <input
                        type="text"
                        class="form-control"
                        name="skills"
                        placeholder="Example: Java, Spring Boot, React"
                        required>

            </div>

            <button class="btn btn-success">

                Recommend Jobs

            </button>

        </form>

        <hr>

        <div th:if="${jobs != null}">

            <h4 class="mb-3">

                Recommended Jobs

            </h4>

            <div class="card mb-3"
                 th:each="job : ${jobs}">

                <div class="card-body">

                    <h5 th:text="${job.title}"></h5>

                    <p>
                        <strong>Company:</strong>
                        <span th:text="${job.company}"></span>
                    </p>

                    <p>
                        <strong>Location:</strong>
                        <span th:text="${job.location}"></span>
                    </p>

                    <p>
                        <strong>Salary:</strong>
                        <span th:text="${job.salary}"></span>
                    </p>

                    <a th:href="@{'/job/' + ${job.id}}"
                       class="btn btn-primary">

                        View Job

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
