<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Admin Dashboard</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/admin-dashboard.css}">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>JobPortal</h2>

        <ul>

            <li>

                <a th:href="@{/admin/dashboard}">

                    Dashboard

                </a>

            </li>

            <li>

                <a th:href="@{/admin/users}">

                    Manage Users

                </a>

            </li>

            <li>

                <a th:href="@{/admin/recruiters}">

                    Recruiters

                </a>

            </li>

            <li>

                <a th:href="@{/admin/jobs}">

                    Jobs

                </a>

            </li>

            <li>

                <a th:href="@{/admin/companies}">

                    Companies

                </a>

            </li>

            <li>

                <a th:href="@{/admin/reports}">

                    Reports

                </a>

            </li>

            <li>

                <form th:action="@{/logout}" method="post">

                    <button type="submit"
                            class="logout-btn">

                        Logout

                    </button>

                </form>

            </li>

        </ul>

    </div>

    <!-- Main -->

    <div class="main-content">

        <div class="topbar">

            <h2>

                Welcome Admin

            </h2>

        </div>

        <div class="row mt-4">

            <div class="col-md-3">

                <div class="dashboard-card blue">

                    <h1 th:text="${totalUsers}"></h1>

                    <h5>Total Users</h5>

                </div>

            </div>

            <div class="col-md-3">

                <div class="dashboard-card green">

                    <h1 th:text="${totalJobs}"></h1>

                    <h5>Total Jobs</h5>

                </div>

            </div>

            <div class="col-md-3">

                <div class="dashboard-card orange">

                    <h1 th:text="${totalCompanies}"></h1>

                    <h5>Companies</h5>

                </div>

            </div>

            <div class="col-md-3">

                <div class="dashboard-card red">

                    <h1 th:text="${totalApplications}"></h1>

                    <h5>Applications</h5>

                </div>

            </div>

        </div>

        <div class="card shadow mt-5">

            <div class="card-header bg-primary text-white">

                <h4>

                    Registered Users

                </h4>

            </div>

            <div class="card-body">

                <table class="table table-hover">

                    <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Email</th>

                        <th>Role</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="user : ${users}">

                        <td th:text="${user.id}"></td>

                        <td th:text="${user.fullName}"></td>

                        <td th:text="${user.email}"></td>

                        <td th:text="${user.role}"></td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</body>

</html>
