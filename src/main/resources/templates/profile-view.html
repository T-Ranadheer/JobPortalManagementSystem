<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <div class="text-center">

            <img th:if="${user.profileImage != null}"
                 th:src="@{'/uploads/profile/' + ${user.profileImage}}"
                 width="150"
                 height="150"
                 class="rounded-circle">

            <h3 class="mt-3" th:text="${user.fullName}"></h3>

        </div>

        <hr>

        <table class="table">

            <tr>
                <th>Email</th>
                <td th:text="${user.email}"></td>
            </tr>

            <tr>
                <th>Phone</th>
                <td th:text="${user.phone}"></td>
            </tr>

            <tr>
                <th>Address</th>
                <td th:text="${user.address}"></td>
            </tr>

            <tr>
                <th>Education</th>
                <td th:text="${user.education}"></td>
            </tr>

            <tr>
                <th>Skills</th>
                <td th:text="${user.skills}"></td>
            </tr>

            <tr>
                <th>Experience</th>
                <td th:text="${user.experience}"></td>
            </tr>

            <tr>
                <th>GitHub</th>
                <td>
                    <a th:href="${user.github}" target="_blank">
                        GitHub
                    </a>
                </td>
            </tr>

            <tr>
                <th>LinkedIn</th>
                <td>
                    <a th:href="${user.linkedin}" target="_blank">
                        LinkedIn
                    </a>
                </td>
            </tr>

        </table>

        <a th:href="@{/profile}"
           class="btn btn-primary">
            Edit Profile
        </a>

    </div>

</div>

</body>

</html>
