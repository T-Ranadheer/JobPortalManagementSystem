<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Available Jobs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/jobs.css}">

</head>

<body>

<body>

<!-- ===== Navbar Starts Here ===== -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold"
           th:href="@{/dashboard}">

            JobPortal

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/jobs}">
                        Jobs
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/saved-jobs}">
                        Saved Jobs
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/profile}">
                        Profile
                    </a>
                </li>

                <li class="nav-item ms-3">

                    <form th:action="@{/logout}" method="post">

                        <button class="btn btn-danger">

                            Logout

                        </button>

                    </form>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ===== Navbar Ends Here ===== -->

<div class="container py-5">

    <!-- Your existing Jobs page starts here -->

    ...

<div class="container py-5">

    <h1 class="page-title">
        Find Your Dream Job
    </h1>

    <div th:if="${param.success}"
         class="alert alert-success">

        ✔ Application submitted successfully.

    </div>

    <!-- Search -->

    <form th:action="@{/jobs/search}"
          method="get"
          class="search-box row g-3">

        <div class="col-lg-3">

            <input type="text"
                   name="title"
                   class="form-control"
                   placeholder="Job Title">

        </div>

        <div class="col-lg-3">

            <input type="text"
                   name="company"
                   class="form-control"
                   placeholder="Company">

        </div>

        <div class="col-lg-3">

            <input type="text"
                   name="location"
                   class="form-control"
                   placeholder="Location">

        </div>

        <div class="col-lg-3">

            <button class="btn btn-primary w-100">

                Search Jobs

            </button>

        </div>

    </form>

    <div class="row mt-4">

        <div class="col-lg-4 col-md-6 mb-4"
             th:each="job : ${jobs}">

            <div class="card job-card h-100">

                <div class="card-body">

                    <!-- Company -->

                    <div class="company-header">

                        <div class="company-logo">

                            <img th:if="${job.company=='TCS'}"
                                 th:src="@{/images/tcs.png}">

                            <img th:if="${job.company=='Infosys'}"
                                 th:src="@{/images/infosys.png}">

                            <img th:if="${job.company=='Wipro'}"
                                 th:src="@{/images/wipro.png}">

                            <img th:if="${job.company=='Google'}"
                                 th:src="@{/images/google.png}">

                            <img th:if="${job.company=='Microsoft'}"
                                 th:src="@{/images/microsoft.png}">

                            <img th:if="${job.company=='Accenture'}"
                                 th:src="@{/images/accenture.png}">

                        </div>

                        <div>

                            <h5 class="company-name"
                                th:text="${job.company}">
                            </h5>

                            <small class="text-muted">
                                Hiring Now
                            </small>

                        </div>

                    </div>

                    <!-- Title -->

                    <h3 class="job-title"
                        th:text="${job.title}">
                    </h3>



                    <!-- Tags -->

                    <div class="job-tags">

                        <span th:text="${job.location}"></span>

                        <span th:text="${job.salary}"></span>

                        <span th:text="${job.experience}"></span>

                        <span th:text="${job.employmentType}"></span>

                    </div>

                    <p class="job-description"
                       th:text="${job.description}">
                    </p>

                </div>

                <div class="card-footer d-flex justify-content-between">

                    <a class="btn btn-primary"
                       th:href="@{'/job/' + ${job.id}}">

                        View

                    </a>

                    <a class="btn btn-success"
                       th:href="@{'/save-job/' + ${job.id}}">

                        Save

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
