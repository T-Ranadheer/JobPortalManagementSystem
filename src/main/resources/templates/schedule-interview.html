<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Schedule Interview</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>Schedule Interview</h2>

        <form th:action="@{/recruiter/save-interview}"
              th:object="${interview}"
              method="post">

            <input type="hidden"
                   th:field="*{application.id}">

            <div class="mb-3">

                <label>Date</label>

                <input type="date"
                       class="form-control"
                       th:field="*{interviewDate}"
                       required>

            </div>

            <div class="mb-3">

                <label>Time</label>

                <input type="time"
                       class="form-control"
                       th:field="*{interviewTime}"
                       required>

            </div>

            <div class="mb-3">

                <label>Mode</label>

                <select class="form-select"
                        th:field="*{mode}">

                    <option>Online</option>

                    <option>Offline</option>

                </select>

            </div>

            <div class="mb-3">

                <label>Meeting Link / Address</label>

                <input type="text"
                       class="form-control"
                       th:field="*{meetingLink}">

            </div>

            <button class="btn btn-success">

                Schedule Interview

            </button>

        </form>

    </div>

</div>

</body>

</html>
