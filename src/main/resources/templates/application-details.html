<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Applicant Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Applicant Details</h2>

    <table class="table table-bordered">

        <tr>
            <th>Name</th>
            <td th:text="${application.applicantName}"></td>
        </tr>

        <tr>
            <th>Email</th>
            <td th:text="${application.applicantEmail}"></td>
        </tr>

        <tr>
            <th>Phone</th>
            <td th:text="${application.phone}"></td>
        </tr>

        <tr>
            <th>Status</th>
            <td th:text="${application.status}"></td>
        </tr>

        <tr>
            <th>Resume</th>
            <td>
                <a
                        th:href="@{'/resume/' + ${application.resumeFileName}}">
                    Download Resume
                </a>
            </td>
        </tr>

    </table>

</div>

</body>

</html>
