<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">System Analytics</h2>

    <input type="hidden" id="users" th:value="${users}">
    <input type="hidden" id="jobs" th:value="${jobs}">
    <input type="hidden" id="companies" th:value="${companies}">
    <input type="hidden" id="applications" th:value="${applications}">

    <div class="card shadow p-4">
        <canvas id="myChart"></canvas>
    </div>

</div>

<script>

    const users = Number(document.getElementById("users").value);
    const jobs = Number(document.getElementById("jobs").value);
    const companies = Number(document.getElementById("companies").value);
    const applications = Number(document.getElementById("applications").value);

    const ctx = document.getElementById("myChart");

    new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Users", "Jobs", "Companies", "Applications"],
            datasets: [{
                label: "System Statistics",
                data: [users, jobs, companies, applications]
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

</script>

</body>
</html>
