<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Applicant Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2>Job Applicants</h2>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">

                <tr>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Phone</th>

                    <th>Job</th>

                    <th>Resume</th>

                    <th>Applied Date</th>

                    <th>Status</th>

                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(applications)}">

                    <td colspan="8" class="text-center">

                        No Applications Found

                    </td>

                </tr>

                <tr th:each="app : ${applications}">

                    <td th:text="${app.user.fullName}"></td>

                    <td th:text="${app.user.email}"></td>

                    <td th:text="${app.user.phone}"></td>

                    <td th:text="${app.job.title}"></td>

                    <td>

                        <a th:href="@{'/uploads/resumes/' + ${app.resume}}"
                           target="_blank"
                           class="btn btn-info btn-sm">

                            View Resume

                        </a>

                    </td>

                    <td th:text="${app.appliedDate}"></td>

                    <td>

                        <span th:if="${app.status=='Pending'}"
                              class="badge bg-warning"
                              th:text="${app.status}">
                        </span>

                        <span th:if="${app.status=='Accepted'}"
                              class="badge bg-success"
                              th:text="${app.status}">
                        </span>

                        <span th:if="${app.status=='Rejected'}"
                              class="badge bg-danger"
                              th:text="${app.status}">
                        </span>

                    </td>

                    <td>

                        <a th:href="@{'/recruiter/application/accept/' + ${app.id}}"
                           class="btn btn-success btn-sm">

                            Accept

                        </a>

                        <a th:href="@{'/recruiter/application/reject/' + ${app.id}}"
                           class="btn btn-danger btn-sm">

                            Reject

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

            <a th:href="@{/recruiter/dashboard}"
               class="btn btn-secondary">

                Back

            </a>

        </div>

    </div>

</div>

</body>

</html>
