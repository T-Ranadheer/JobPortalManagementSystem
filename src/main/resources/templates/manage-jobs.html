<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Manage Jobs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Manage Jobs</h2>

    <table class="table table-bordered table-hover shadow">

        <thead class="table-dark">

        <tr>
            <th>Job Title</th>
            <th>Company</th>
            <th>Location</th>
            <th>Salary</th>
            <th>Experience</th>
            <th>Vacancies</th>
            <th>Action</th>
        </tr>

        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(jobs)}">
            <td colspan="7" class="text-center">
                No Jobs Available
            </td>
        </tr>

        <tr th:each="job : ${jobs}">

            <td th:text="${job.title}"></td>

            <td th:text="${job.company}"></td>

            <td th:text="${job.location}"></td>

            <td th:text="${job.salary}"></td>

            <td th:text="${job.experience}"></td>

            <td th:text="${job.vacancies}"></td>

            <td>

                <a th:href="@{'/recruiter/edit-job/' + ${job.id}}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{'/recruiter/delete-job/' + ${job.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this job?');">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <a th:href="@{/recruiter/dashboard}" class="btn btn-secondary">
        Back
    </a>

</div>

</body>

</html>
