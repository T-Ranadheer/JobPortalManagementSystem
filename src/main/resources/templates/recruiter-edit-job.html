<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Edit Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/recruiter-job.css}">

</head>

<body>

<div class="container py-5">

    <div class="card shadow-lg">

        <div class="card-header bg-warning text-dark">

            <h2>

                Edit Job

            </h2>

        </div>

        <div class="card-body">

            <form
                    th:action="@{/recruiter/update-job}"
                    th:object="${job}"
                    method="post">

                <input
                        type="hidden"
                        th:field="*{id}">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Job Title</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{title}"
                                required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Company</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{company}"
                                required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Location</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{location}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Salary</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{salary}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Experience</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{experience}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Education</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{education}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Skills</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{skills}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Vacancies</label>

                        <input
                                type="number"
                                class="form-control"
                                th:field="*{vacancies}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Employment Type</label>

                        <select
                                class="form-select"
                                th:field="*{employmentType}">

                            <option>Full Time</option>

                            <option>Part Time</option>

                            <option>Internship</option>

                            <option>Remote</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Deadline</label>

                        <input
                                type="date"
                                class="form-control"
                                th:field="*{applicationDeadline}">

                    </div>

                    <div class="col-md-12 mb-3">

                        <label>Category</label>

                        <select
                                class="form-select"
                                th:field="*{category.id}">

                            <option
                                    th:each="c:${categories}"
                                    th:value="${c.id}"
                                    th:text="${c.name}">
                            </option>

                        </select>

                    </div>

                    <div class="col-md-12 mb-4">

                        <label>Description</label>

                        <textarea
                                class="form-control"
                                rows="6"
                                th:field="*{description}">
</textarea>

                    </div>

                </div>

                <button
                        class="btn btn-warning">

                    Update Job

                </button>

                <a
                        th:href="@{/recruiter/manage-jobs}"
                        class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
